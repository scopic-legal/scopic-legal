name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-electron:
    name: Build Electron installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            eb_args: --win
          # Uncomment to also ship macOS DMG:
          # - os: macos-latest
          #   eb_args: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Scopic
        uses: actions/checkout@v4
        with:
          path: scopic

      - name: Checkout Team Suzie
        uses: actions/checkout@v4
        with:
          repository: firelex/open_teamsuzie
          path: teamsuzie_oss

      # Mirror teamsuzie_oss to the relative path that pnpm link: entries expect.
      # apps/suzielaw/package.json uses link:../../../../../code/teamsuzie_oss/…
      # From $GITHUB_WORKSPACE/scopic, that resolves to $GITHUB_WORKSPACE/../../code/teamsuzie_oss.
      - name: Mirror Team Suzie link path
        shell: bash
        run: |
          target="../../code/teamsuzie_oss"
          mkdir -p "$(dirname "$target")"
          rm -rf "$target"
          cp -R "$GITHUB_WORKSPACE/teamsuzie_oss" "$target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Build Team Suzie packages
        working-directory: scopic
        run: pnpm deps:build

      - name: Install dependencies
        working-directory: scopic
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Build Scopic (TypeScript + Vite)
        working-directory: scopic
        run: pnpm build

      # Bundle the server into a single CJS file so electron-builder never has
      # to traverse pnpm's junction-based node_modules for @teamsuzie/* packages.
      - name: Bundle server (esbuild)
        working-directory: scopic
        run: node scripts/bundle-server.mjs

      # pnpm creates Windows directory junctions for node_modules entries.
      # electron-builder's @electron/rebuild cannot follow junctions to find
      # binding.gyp, so native module rebuild fails. Replace the two native
      # module junctions with real directory copies before packaging.
      - name: Flatten native module junctions (Windows)
        if: runner.os == 'Windows'
        working-directory: scopic
        shell: pwsh
        run: |
          foreach ($pkg in @('better-sqlite3', 'sqlite-vec')) {
            $junctionPath = "node_modules\$pkg"
            $item = Get-Item $junctionPath -ErrorAction SilentlyContinue
            if ($item -and $item.LinkType) {
              $realPath = $item.Target
              Write-Host "Flattening junction: $junctionPath -> $realPath"
              Remove-Item $junctionPath
              Copy-Item $realPath $junctionPath -Recurse -Force
            } else {
              Write-Host "$junctionPath is already a real directory or does not exist"
            }
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo "${{ github.repository }}" `
              --title "Scopic $tag" `
              --notes "Auto-update release. Download the Windows installer asset named Scopic-Setup-$($tag.TrimStart('v')).exe."
          }

      # electron-builder reads GH_TOKEN to upload artifacts to the release that
      # was created by the tag push. It produces:
      #   • Scopic Setup <version>.exe  — the NSIS installer users download
      #   • latest.yml                  — metadata read by electron-updater
      - name: Package and publish Electron installer
        working-directory: scopic
        shell: pwsh
        run: |
          $out = pnpm exec electron-builder ${{ matrix.eb_args }} --publish never 2>&1
          $code = $LASTEXITCODE
          $out | ForEach-Object { Write-Host $_ }
          if ($code -ne 0) {
            # Surface key error lines as annotations so they appear in the GitHub API
            $errorLines = $out | Where-Object { $_ -match '(⨯|Error:|error C|FAILED|cannot execute|exit status)' } | Select-Object -Last 15
            $errorLines | ForEach-Object { Write-Host "::error::$_" }
          }
          exit $code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: Upload installer assets to GitHub release
        working-directory: scopic
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $latest = Get-Item "dist-electron\latest.yml" -ErrorAction SilentlyContinue
          if (-not $latest) {
            Write-Host "::error::dist-electron\latest.yml was not produced"
            Get-ChildItem dist-electron -File | ForEach-Object { Write-Host "dist-electron file: $($_.Name)" }
            exit 1
          }

          $latestContent = Get-Content $latest.FullName -Raw
          $pathMatch = [regex]::Match($latestContent, '(?m)^path:\s*(.+?)\s*$')
          if (-not $pathMatch.Success) {
            Write-Host "::error::latest.yml does not contain an installer path"
            Write-Host $latestContent
            exit 1
          }

          $installerName = $pathMatch.Groups[1].Value.Trim().Trim('"').Trim("'")
          $installer = Get-Item (Join-Path "dist-electron" $installerName) -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Host "::error::latest.yml points to '$installerName', but that file is missing from dist-electron"
            Get-ChildItem dist-electron -File | ForEach-Object { Write-Host "dist-electron file: $($_.Name)" }
            exit 1
          }

          $assets = @($installer)
          $blockmap = Get-Item (Join-Path "dist-electron" "$installerName.blockmap") -ErrorAction SilentlyContinue
          if ($blockmap) {
            $assets += $blockmap
          } else {
            Write-Host "::warning::No blockmap found for $installerName"
          }
          $assets += $latest

          if (-not $assets) {
            Write-Host "::error::No installer assets found in dist-electron"
            exit 1
          }

          $assets | ForEach-Object {
            Write-Host "Uploading $($_.FullName)"
            gh release upload $tag $_.FullName --repo "${{ github.repository }}" --clobber
          }
