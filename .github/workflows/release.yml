name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and publish source archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Scopic
        uses: actions/checkout@v4
        with:
          path: scopic

      - name: Checkout Team Suzie
        uses: actions/checkout@v4
        with:
          repository: firelex/open_teamsuzie
          path: teamsuzie_oss

      - name: Mirror Team Suzie link path
        shell: bash
        run: |
          target="../../code/teamsuzie_oss"
          mkdir -p "$(dirname "$target")"
          rm -rf "$target"
          cp -R "$GITHUB_WORKSPACE/teamsuzie_oss" "$target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Build Team Suzie packages
        working-directory: scopic
        run: pnpm deps:build

      - name: Install dependencies
        working-directory: scopic
        run: pnpm install --frozen-lockfile

      - name: Build Scopic
        working-directory: scopic
        run: pnpm build

      - name: Create source archive
        shell: bash
        run: |
          artifact="scopic-${GITHUB_REF_NAME}-source.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='.dev-logs' \
            --exclude='data' \
            -czf "$artifact" \
            -C scopic .
          echo "artifact=$artifact" >> "$GITHUB_ENV"

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
