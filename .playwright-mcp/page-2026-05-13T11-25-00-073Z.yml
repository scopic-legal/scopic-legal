        - paragraph [ref=e59]: 01/The case
        - heading "Why open source matters" [level=2] [ref=e60]
        - paragraph [ref=e61]: Suzie Law is an open-source alternative to closed legal AI assistants. It gives legal teams a capable baseline they can inspect and adapt, while leaving room for the deeper workflows that make each practice distinctive.
