            - heading "Baseline legal AI should be accessible" [level=3] [ref=e71]
            - paragraph [ref=e72]: A serious legal AI workspace — assistant chat, document Q&A, drafting, structured review, and DOCX output — should not be locked inside closed platforms. Suzie Law ships that baseline as open-source code.
        - generic [ref=e74]:
          - img [ref=e76]
          - generic [ref=e80]:
            - heading "Real value is in agentic workflows" [level=3] [ref=e81]
            - paragraph [ref=e82]: Drafting playbooks, deal checklists, obligations management, jurisdiction-specific review templates, post-signing tracking — the parts of legal practice that are specific to how your firm works. The longer your firm builds them, the more they compound.
        - generic [ref=e84]:
