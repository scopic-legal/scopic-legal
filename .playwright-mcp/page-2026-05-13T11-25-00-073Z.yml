            - heading "That depth requires inspectable code" [level=3] [ref=e91]
            - paragraph [ref=e92]: Agent workflows that match how your firm actually practices law mean controlling prompts, tool wiring, data shapes, output formats, and the agent's behavior at every step. That level of opinion belongs in software you can inspect, modify, and run.
